version: "3.8"

services:
  nas-agent:
    build: .
    container_name: nas-agent
    restart: unless-stopped
    network_mode: bridge
    env_file:
      - .env
    environment:
      - CLAUDE_CLI_PATH=/root/.claude/local/claude
      - PROJECTS_DIR=/app/projects
      - HEALTH_PORT=9100
    volumes:
      # Docker 소켓 - 호스트 Docker를 컨테이너에서 제어
      - /run/docker.sock:/var/run/docker.sock
      # 프로젝트 저장소 - NAS 공유폴더에 영구 저장
      - /volume1/docker/nas-agent/projects:/app/projects
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
