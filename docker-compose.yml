version: "3.8"

services:
  nas-agent:
    build: .
    container_name: nas-agent
    restart: unless-stopped
    networks:
      - nas-agent-shared
    env_file:
      - .env
    volumes:
      # Docker 소켓 - 호스트 Docker를 컨테이너에서 제어
      - /run/docker.sock:/var/run/docker.sock
      # 프로젝트 저장소 - NAS 공유폴더에 영구 저장
      - /volume1/docker/nas-agent/projects:/app/projects
      # 레지스트리 DB / 워크플로 체크포인트
      - /volume1/docker/nas-agent/data:/app/data
      # Claude CLI 로그인 세션 영속화 (MAX 구독)
      - /volume1/docker/nas-agent/claude-config:/root/.claude
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  nas-agent-shared:
    external: true
